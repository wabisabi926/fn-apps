<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频播放器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root,
    [data-theme="dark"] {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-elevated: #1f2b47;
      --accent: #6c63ff;
      --accent-light: #8b83ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --text-muted: #555570;
      --border: rgba(255, 255, 255, 0.06);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-hover: rgba(255, 255, 255, 0.06);
      --shadow: rgba(0, 0, 0, 0.5);
      --disc-groove: rgba(255, 255, 255, 0.015);
      --disc-bg1: #1a1a2e;
      --disc-bg2: #2a2a4e;
      --success-bg: rgba(34, 197, 94, 0.15);
      --success-text: #4ade80;
      --success-border: rgba(34, 197, 94, 0.2);
      --error-bg: rgba(239, 68, 68, 0.15);
      --error-text: #f87171;
      --error-border: rgba(239, 68, 68, 0.2);
      --modal-overlay: rgba(0, 0, 0, 0.6);
      color-scheme: dark;
    }

    [data-theme="light"] {
      --bg-primary: #f0f2f5;
      --bg-secondary: #ffffff;
      --bg-card: #f7f8fa;
      --bg-elevated: #eef0f4;
      --accent: #5b52e0;
      --accent-light: #7b73ff;
      --accent-glow: rgba(91, 82, 224, 0.2);
      --text-primary: #1a1a2e;
      --text-secondary: #666680;
      --text-muted: #9999b0;
      --border: rgba(0, 0, 0, 0.08);
      --glass: rgba(0, 0, 0, 0.02);
      --glass-hover: rgba(0, 0, 0, 0.04);
      --shadow: rgba(0, 0, 0, 0.1);
      --disc-groove: rgba(0, 0, 0, 0.03);
      --disc-bg1: #e8e8f0;
      --disc-bg2: #d8d8e8;
      --success-bg: rgba(34, 197, 94, 0.1);
      --success-text: #16a34a;
      --success-border: rgba(34, 197, 94, 0.15);
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-text: #dc2626;
      --error-border: rgba(239, 68, 68, 0.15);
      --modal-overlay: rgba(0, 0, 0, 0.3);
      color-scheme: light;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      color: var(--text-primary);
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(108, 99, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .player {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      max-height: 100vh;
      background: var(--bg-secondary);
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px var(--shadow), 0 0 120px var(--accent-glow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .disc-area {
      position: relative;
      padding: 40px 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg-secondary) 100%);
    }

    .disc-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 28px;
    }

    .disc {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--disc-bg1), var(--disc-bg2), var(--disc-bg1), var(--disc-bg2), var(--disc-bg1));
      box-shadow: 0 0 0 3px var(--border), 0 8px 32px var(--shadow), inset 0 0 40px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      overflow: hidden;
    }

    .disc.spinning {
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .disc-grooves {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: repeating-radial-gradient(circle at center,
          transparent 0px, transparent 3px,
          var(--disc-groove) 3px, var(--disc-groove) 4px);
      pointer-events: none;
    }

    .disc-cover {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    .disc-label {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff6b6b);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--accent-glow);
      z-index: 1;
    }

    .disc-label svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .disc-hole {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg-primary);
      z-index: 2;
    }

    .track-info {
      text-align: center;
      width: 100%;
      margin-bottom: 20px;
    }

    .track-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-section {
      width: 100%;
      padding: 0 32px;
      margin-bottom: 24px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--text-muted);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      transition: height 0.15s ease;
    }

    .progress-bar:hover {
      height: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff6b6b);
      border-radius: 2px;
      width: 0%;
      position: relative;
      transition: width 0.1s linear;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%) scale(0);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px var(--accent-glow);
      transition: transform 0.15s ease;
    }

    .progress-bar:hover .progress-fill::after {
      transform: translateY(-50%) scale(1);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .ctrl-btn:hover {
      color: var(--text-primary);
      background: var(--glass);
    }

    .ctrl-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .ctrl-btn.play-btn {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #8b6bff);
      color: white;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .ctrl-btn.play-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 28px rgba(108, 99, 255, 0.5);
      background: linear-gradient(135deg, var(--accent-light), #9b7bff);
    }

    .ctrl-btn.play-btn:active {
      transform: scale(0.96);
    }

    .ctrl-btn.play-btn svg {
      width: 24px;
      height: 24px;
    }

    .volume-section {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 32px;
      margin-bottom: 8px;
    }

    .volume-icon {
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    .volume-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .volume-slider {
      flex: 1;
      height: 4px;
      background: var(--text-muted);
      border-radius: 2px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent-glow);
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }

    .volume-val {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    .tab-bar {
      display: flex;
      padding: 0 24px;
      gap: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .tab-btn:hover {
      color: var(--text-secondary);
    }

    .tab-btn.active {
      color: var(--accent-light);
      border-bottom-color: var(--accent);
    }

    .tab-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .lyrics-section {
      padding: 0;
      min-height: 120px;
    }

    .lyrics-container {
      max-height: 240px;
      overflow-y: auto;
      padding: 16px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent;
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
    }

    .lyrics-container::-webkit-scrollbar {
      width: 4px;
    }

    .lyrics-container::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .lyric-line {
      padding: 6px 0;
      font-size: 14px;
      color: var(--text-muted);
      transition: all 0.3s ease;
      line-height: 1.6;
      cursor: pointer;
    }

    .lyric-line:hover {
      color: var(--text-secondary);
    }

    .lyric-line.active {
      color: var(--accent-light);
      font-size: 15px;
      font-weight: 500;
    }

    .lyrics-empty {
      padding: 32px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .lyrics-empty svg {
      display: block;
      margin: 0 auto 10px;
      width: 28px;
      height: 28px;
      fill: var(--text-muted);
      opacity: 0.5;
    }

    .playlist-section {
      padding: 0;
    }

    .playlist-items {
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent;
    }

    .playlist-items::-webkit-scrollbar {
      width: 4px;
    }

    .playlist-items::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s ease;
      position: relative;
    }

    .playlist-item:hover {
      background: var(--glass-hover);
    }

    .playlist-item.active {
      background: rgba(108, 99, 255, 0.08);
    }

    .playlist-item.active .pl-index {
      color: var(--accent);
    }

    .playlist-item.active .pl-name {
      color: var(--accent-light);
    }

    .playlist-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--accent);
    }

    .pl-index {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 20px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .pl-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .pl-icon svg {
      width: 16px;
      height: 16px;
      fill: var(--text-secondary);
    }

    .pl-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .playlist-item.active .pl-icon {
      background: rgba(108, 99, 255, 0.15);
    }

    .playlist-item.active .pl-icon svg {
      fill: var(--accent);
    }

    .pl-info {
      flex: 1;
      min-width: 0;
    }

    .pl-name {
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-ext {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .playlist-empty {
      padding: 32px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .add-section {
      padding: 12px 24px 16px;
    }

    .add-btns {
      display: flex;
      gap: 8px;
    }

    .add-btn {
      flex: 1;
      padding: 12px;
      border: 1.5px dashed var(--text-muted);
      border-radius: 12px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108, 99, 255, 0.04);
    }

    .add-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .file-input {
      display: none;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-family: inherit;
      z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    .toast.error {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border-radius: 20px;
      border: 1px solid var(--border);
      width: 90%;
      max-width: 480px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px var(--shadow);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--glass);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.15s;
    }

    .modal-close:hover {
      background: var(--glass-hover);
      color: var(--text-primary);
    }

    .modal-path {
      padding: 12px 24px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-path svg {
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
      flex-shrink: 0;
    }

    .modal-path span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent;
    }

    .modal-body::-webkit-scrollbar {
      width: 4px;
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .browse-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .browse-item:hover {
      background: var(--glass-hover);
    }

    .browse-item.selected {
      background: rgba(108, 99, 255, 0.08);
    }

    .browse-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .browse-icon.folder {
      background: rgba(255, 193, 7, 0.12);
    }

    .browse-icon.folder svg {
      fill: #ffc107;
    }

    .browse-icon.audio {
      background: rgba(108, 99, 255, 0.12);
    }

    .browse-icon.audio svg {
      fill: var(--accent);
    }

    .browse-icon svg {
      width: 18px;
      height: 18px;
    }

    .browse-name {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .browse-item.selected .browse-name {
      color: var(--accent-light);
    }

    .browse-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .browse-item.selected .browse-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .browse-item.selected .browse-check::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 20px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .modal-btn.cancel {
      background: var(--glass);
      color: var(--text-secondary);
    }

    .modal-btn.cancel:hover {
      background: var(--glass-hover);
    }

    .modal-btn.confirm {
      background: var(--accent);
      color: white;
    }

    .modal-btn.confirm:hover {
      background: var(--accent-light);
    }

    .modal-btn.confirm:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .browse-empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .browse-loading {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    @media (prefers-reduced-motion: reduce) {
      .disc.spinning {
        animation: none;
      }

      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }

    @media (max-height: 700px) {
      .disc-wrapper {
        width: 140px;
        height: 140px;
        margin-bottom: 16px;
      }

      .disc {
        width: 140px;
        height: 140px;
      }

      .disc-cover {
        width: 140px;
        height: 140px;
      }

      .disc-label {
        width: 52px;
        height: 52px;
      }

<body>
  <div class="player">
    <div class="disc-area">
      <div class="disc-wrapper">
        <div class="disc" id="disc">
          <div class="disc-grooves"></div>
          <img class="disc-cover" id="discCover" style="display:none" alt="">
          <div class="disc-label" id="discLabel">
            <svg viewBox="0 0 24 24">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
            </svg>
          </div>
          <div class="disc-hole"></div>
        </div>

      <div class="track-info">
        <div class="track-title" id="trackTitle" data-i18n="waitingToPlay">等待播放</div>

    <div class="progress-section">

    <div class="controls">

      <button class="ctrl-btn" id="nextBtn" title="下一首">

    <div class="volume-section">

        <svg viewBox="0 0 24 24">
          <path
            d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />

        <svg viewBox="0 0 24 24">

            d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z" />
        </svg>

                d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />

        <button class="add-btn" onclick="document.getElementById('fileInput').click()">

  <div class="modal-overlay" id="browserOverlay">

          <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" />
        </svg>
        <span id="browserPathText">/</span>

        <button class="modal-btn confirm" id="browserConfirm" onclick="confirmBrowser()" disabled
          data-i18n="addSelected">添加选中</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <audio id="audioPlayer"></audio>

  <script>
    const API_BASE = '/app/fn-audioplayer/api';
    let playlist = [];
    let currentIndex = -1;
    let currentLyrics = [];
    let activeLyricIndex = -1;
    let browserCurrentDir = '/';
    let browserSelectedPaths = new Set();

    const I18N = {
      "zh-CN": {
        appTitle: "音频播放器",
        waitingToPlay: "等待播放",
        selectAudioToStart: "选择音频文件开始",
        playlist: "播放列表",
        lyrics: "歌词",
        noTracks: "暂无曲目，请添加音频文件",
        noLyrics: "暂无歌词",
        addLocal: "本地上传",
        addFromNas: "NAS浏览",
        browseFiles: "浏览文件",
        loading: "加载中...",
        cancel: "取消",
        addSelected: "添加选中",
        addedToList: "已添加到列表: {name}",
        nowPlaying: "正在播放: {name}",
        addedCount: "已添加 {count} 首音乐",
        pleaseAddAudio: "请先添加音频文件",
        parentDir: "上级目录",
        emptyDir: "此目录无音频文件或子目录",
        permissionDenied: "无权限访问此目录",
        loadFailed: "加载失败",
      },
      "en-US": {
        appTitle: "Audio Player",
        waitingToPlay: "Waiting to play",
        selectAudioToStart: "Select audio file to start",
        playlist: "Playlist",
        lyrics: "Lyrics",
        noTracks: "No tracks, please add audio files",
        noLyrics: "No lyrics",
        addLocal: "Upload",
        addFromNas: "Browse NAS",
        browseFiles: "Browse Files",
        loading: "Loading...",
        cancel: "Cancel",
        addSelected: "Add Selected",
        addedToList: "Added: {name}",
        nowPlaying: "Now playing: {name}",
        addedCount: "Added {count} track(s)",
        pleaseAddAudio: "Please add audio files first",
        parentDir: "Parent directory",
        emptyDir: "No audio files or subdirectories",
        permissionDenied: "Permission denied",
        loadFailed: "Load failed",
      }
    };

    let currentLang = "zh-CN";

    function t(key, params) {
      const messages = I18N[currentLang] || I18N["zh-CN"];
      let text = messages[key] || I18N["zh-CN"][key] || key;
      if (params) {
        Object.keys(params).forEach(k => {
          text = text.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]);
        });
      }
      return text;
    }

    function detectLanguage() {
      try {
        const cookie = document.cookie.split(';').map(s => s.trim()).find(s => s.startsWith('language='));
        if (cookie) {
          const val = decodeURIComponent(cookie.split('=')[1] || '');
          if (val.toLowerCase().startsWith('zh')) return 'zh-CN';
          if (val.toLowerCase().startsWith('en')) return 'en-US';
        }
      } catch (e) { }
      const nav = (navigator.language || '').toLowerCase();
      if (nav.startsWith('zh')) return 'zh-CN';
      return 'en-US';
    }

    function applyI18n() {
      currentLang = detectLanguage();
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.title = t('appTitle');
    }

    function detectTheme() {
      try {
        const cookie = document.cookie.split(';').map(s => s.trim()).find(s => s.startsWith('fnos-theme-mode='));
        if (cookie) {
          const val = decodeURIComponent(cookie.split('=')[1] || '').toLowerCase();
          if (val === '10' || val === 'light') return 'light';
          if (val === '20' || val === 'dark') return 'dark';
        }
      } catch (e) { }
      try {
        const bodyTheme = document.body?.getAttribute('theme-mode');
        if (bodyTheme === '10' || bodyTheme === 'light') return 'light';
        if (bodyTheme === '20' || bodyTheme === 'dark') return 'dark';
      } catch (e) { }
      try {
        const stored = localStorage.getItem('fnos-theme-mode');
        if (stored === '10' || stored === 'light') return 'light';
        if (stored === '20' || stored === 'dark') return 'dark';
      } catch (e) { }
      try {
        const parentStored = window.parent?.localStorage?.getItem('fnos-theme-mode');
        if (parentStored === '10' || parentStored === 'light') return 'light';
        if (parentStored === '20' || parentStored === 'dark') return 'dark';
      } catch (e) { }
      const urlTheme = new URLSearchParams(location.search).get('theme');
      if (urlTheme === 'light') return 'light';
      if (urlTheme === 'dark') return 'dark';
      return window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme() {
      const theme = detectTheme();
      document.documentElement.dataset.theme = theme;
    }

    const channel = new BroadcastChannel('fn-audioplayer');
    let isPrimaryWindow = true;
    let pendingFilePath = null;

    channel.onmessage = function (e) {
      const msg = e.data;
      if (msg && msg.type === 'ping') {
        channel.postMessage({ type: 'pong' });
      }
      if (msg && msg.type === 'open-file' && msg.path) {
        addFileFromPath(msg.path);
        channel.postMessage({ type: 'pong' });
      }
      if (msg && msg.type === 'pong') {
        isPrimaryWindow = false;
      }
    };

    function claimPrimary() {
      isPrimaryWindow = true;
    }

    const audioPlayer = document.getElementById('audioPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const trackTitle = document.getElementById('trackTitle');
    const trackSubtitle = document.getElementById('trackSubtitle');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    const fileInput = document.getElementById('fileInput');
    const playlistItems = document.getElementById('playlistItems');
    const disc = document.getElementById('disc');
    const discCover = document.getElementById('discCover');
    const discLabel = document.getElementById('discLabel');
    const toast = document.getElementById('toast');
    const lyricsContainer = document.getElementById('lyricsContainer');
    const tabPlaylist = document.getElementById('tabPlaylist');
    const tabLyrics = document.getElementById('tabLyrics');
    const panelPlaylist = document.getElementById('panelPlaylist');
    const panelLyrics = document.getElementById('panelLyrics');

    const PAUSE_ICON = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';
    const FORMAT_LABELS = { mp3: 'MP3', wav: 'WAV', flac: 'FLAC', ogg: 'OGG', m4a: 'M4A', aac: 'AAC', wma: 'WMA', ape: 'APE' };

    playPauseBtn.addEventListener('click', togglePlayPause);
    prevBtn.addEventListener('click', previousTrack);
    nextBtn.addEventListener('click', nextTrack);
    audioPlayer.addEventListener('timeupdate', updateProgress);
    audioPlayer.addEventListener('loadedmetadata', updateDuration);
    audioPlayer.addEventListener('ended', nextTrack);
    audioPlayer.addEventListener('play', () => { playIcon.innerHTML = PAUSE_ICON; disc.classList.add('spinning'); });
    audioPlayer.addEventListener('pause', () => { playIcon.innerHTML = PLAY_ICON; disc.classList.remove('spinning'); });
    progressBar.addEventListener('click', seek);
    volumeSlider.addEventListener('input', updateVolume);
    fileInput.addEventListener('change', handleFileSelect);

    tabPlaylist.addEventListener('click', () => switchTab('playlist'));
    tabLyrics.addEventListener('click', () => switchTab('lyrics'));

    function switchTab(tab) {
      tabPlaylist.classList.toggle('active', tab === 'playlist');
      tabLyrics.classList.toggle('active', tab === 'lyrics');
      panelPlaylist.classList.toggle('active', tab === 'playlist');
      panelLyrics.classList.toggle('active', tab === 'lyrics');
    }

    function togglePlayPause() {
      if (playlist.length === 0) { showToast(t('pleaseAddAudio'), 'error'); return; }
      audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
    }

    function previousTrack() {
      if (playlist.length === 0) return;
      currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
      loadTrack(currentIndex);
    }

    function nextTrack() {
      if (playlist.length === 0) return;
      currentIndex = (currentIndex + 1) % playlist.length;
      loadTrack(currentIndex);
    }

    function loadTrack(index) {
      if (playlist.length === 0) return;
      currentIndex = index;
      const track = playlist[index];
      if (track.isServerFile) {
        audioPlayer.src = API_BASE + '/audio/stream?file=' + encodeURIComponent(track.path);
      } else {
        audioPlayer.src = track.path;
      }
      trackTitle.textContent = track.title || track.name;
      trackSubtitle.textContent = track.artist ? track.artist + (track.album ? ' - ' + track.album : '') : (FORMAT_LABELS[track.name.split('.').pop().toLowerCase()] || '');
      updatePlaylistUI();
      fetchLyrics(track);
      fetchCover(track);
      if (track.isServerFile && !track.title) {
        fetchMetadata(track, index, true);
      }
      audioPlayer.play().catch(() => { });
    }

    function fetchCover(track) {
      discCover.style.display = 'none';
      discLabel.style.display = 'flex';
      if (!track.isServerFile) return;
      const url = API_BASE + '/audio/cover?file=' + encodeURIComponent(track.path);
      const img = new Image();
      img.onload = function () {
        discCover.src = url;
        discCover.style.display = 'block';
        discLabel.style.display = 'none';
      };
      img.onerror = function () { };
      img.src = url;
    }

    function fetchLyrics(track) {
      currentLyrics = [];
      activeLyricIndex = -1;
      renderLyrics();
      if (!track.isServerFile) return;
      const url = API_BASE + '/lyrics?file=' + encodeURIComponent(track.path);
      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.found && data.lyrics) {
            currentLyrics = parseLRC(data.lyrics);
            if (currentLyrics.length > 0) {
              switchTab('lyrics');
            }
            renderLyrics();
          }
        })
        .catch(() => { });
    }

    function parseLRC(lrcText) {
      const lines = lrcText.split('\n');
      const result = [];
      const timeRegex = /\[(\d{1,3}):(\d{2})(?:[.:])(\d{2,3})\]/g;
      for (const line of lines) {
        const times = [];
        let match;
        while ((match = timeRegex.exec(line)) !== null) {
          const min = parseInt(match[1], 10);
          const sec = parseInt(match[2], 10);
          let ms = parseInt(match[3], 10);
          if (match[3].length === 2) ms *= 10;
          times.push(min * 60 + sec + ms / 1000);
        }
        const text = line.replace(/\[\d{1,3}:\d{2}[.:]\d{2,3}\]/g, '').trim();
        if (!text) continue;
        for (const t of times) {
          result.push({ time: t, text: text });
        }
      }
      result.sort((a, b) => a.time - b.time);
      return result;
    }

    function renderLyrics() {
      if (currentLyrics.length === 0) {
        lyricsContainer.innerHTML = '<div class="lyrics-empty"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>' + t('noLyrics') + '</div>';
        return;
      }
      lyricsContainer.innerHTML = currentLyrics.map((l, i) =>
        `<div class="lyric-line" data-index="${i}" onclick="seekToLyric(${i})">${l.text}</div>`
      ).join('');
    }

    function seekToLyric(index) {
      if (index < 0 || index >= currentLyrics.length) return;
      audioPlayer.currentTime = currentLyrics[index].time;
      if (audioPlayer.paused) audioPlayer.play().catch(() => { });
    }

    function updateLyrics() {
      if (currentLyrics.length === 0) return;
      const t = audioPlayer.currentTime;
      let newIndex = -1;
      for (let i = currentLyrics.length - 1; i >= 0; i--) {
        if (t >= currentLyrics[i].time) {
          newIndex = i;
          break;
        }
      }
      if (newIndex === activeLyricIndex) return;
      activeLyricIndex = newIndex;
      const lines = lyricsContainer.querySelectorAll('.lyric-line');
      lines.forEach((el, i) => el.classList.toggle('active', i === newIndex));
      if (newIndex >= 0 && lines[newIndex]) {
        lines[newIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function updateProgress() {
      if (audioPlayer.duration) {
        const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressFill.style.width = percent + '%';
        currentTimeSpan.textContent = formatTime(audioPlayer.currentTime);
      }
      updateLyrics();
    }

    function updateDuration() {
      durationSpan.textContent = formatTime(audioPlayer.duration);
    }

    function seek(e) {
      const rect = progressBar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      audioPlayer.currentTime = percent * audioPlayer.duration;
    }

    function updateVolume() {
      const vol = volumeSlider.value;
      audioPlayer.volume = vol / 100;
      volumeValue.textContent = vol + '%';
      try { localStorage.setItem('fn-audioplayer-volume', vol); } catch (e) { }
    }

    function loadVolume() {
      try {
        const saved = localStorage.getItem('fn-audioplayer-volume');
        if (saved !== null) {
          const vol = Math.max(0, Math.min(100, parseInt(saved, 10)));
          if (!isNaN(vol)) {
            volumeSlider.value = vol;
          }
        }
      } catch (e) { }
    }

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      const wasEmpty = playlist.length === 0;
      files.forEach(file => {
        playlist.push({ name: file.name, path: URL.createObjectURL(file), isServerFile: false });
      });
      updatePlaylistUI();
      if (wasEmpty) loadTrack(0);
      fileInput.value = '';
      showToast(t('addedCount', { count: files.length }), 'success');
    }

    function addFileFromPath(filePath) {
      const fileName = filePath.split('/').pop();
      const isPlaying = !audioPlayer.paused && playlist.length > 0;
      const track = { name: fileName, path: filePath, isServerFile: true };
      playlist.push(track);
      updatePlaylistUI();
      if (isPlaying) {
        showToast(t('addedToList', { name: fileName }), 'success');
        fetchMetadata(track, playlist.length - 1);
      } else {
        currentIndex = playlist.length - 1;
        loadTrack(currentIndex);
        showToast(t('nowPlaying', { name: fileName }), 'success');
      }
    }

    function fetchMetadata(track, index, shouldPlay) {
      if (!track.isServerFile) return;
      fetch(API_BASE + '/audio/metadata?file=' + encodeURIComponent(track.path))
        .then(r => r.json())
        .then(data => {
          if (data.title) track.title = data.title;
          if (data.artist) track.artist = data.artist;
          if (data.album) track.album = data.album;
          updatePlaylistUI();
          if (shouldPlay && index === currentIndex) {
            trackTitle.textContent = track.title || track.name;
            trackSubtitle.textContent = track.artist ? track.artist + (track.album ? ' - ' + track.album : '') : (FORMAT_LABELS[track.name.split('.').pop().toLowerCase()] || '');
          }
        })
        .catch(() => { });
    }

    function updatePlaylistUI() {
      if (playlist.length === 0) {
        playlistItems.innerHTML = '<div class="playlist-empty">' + t('noTracks') + '</div>';
        return;
      }
      playlistItems.innerHTML = playlist.map((item, index) => {
        const ext = item.name.split('.').pop().toLowerCase();
        const active = index === currentIndex;
        const coverUrl = item.isServerFile ? API_BASE + '/audio/cover?file=' + encodeURIComponent(item.path) : '';
        const iconHtml = coverUrl
          ? `<img src="${coverUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" style="display:block"><svg viewBox="0 0 24 24" style="display:none"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`
          : '<svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>';
        return `
          <div class="playlist-item ${active ? 'active' : ''}" onclick="loadTrack(${index})">
            <span class="pl-index">${active ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' : (index + 1)}</span>
            <div class="pl-icon">${iconHtml}</div>
            <div class="pl-info">
              <div class="pl-name">${item.title || item.name}</div>
              <div class="pl-ext">${item.artist || (FORMAT_LABELS[ext] || ext.toUpperCase())}</div>
            </div>
          </div>`;
      }).join('');
    }

    let toastTimer;
    function showToast(message, type) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function openBrowser() {
      browserCurrentDir = '/';
      browserSelectedPaths = new Set();
      document.getElementById('browserOverlay').classList.add('active');
      browseDir('/');
    }

    function closeBrowser() {
      document.getElementById('browserOverlay').classList.remove('active');
    }

    function browseDir(dirPath) {
      browserCurrentDir = dirPath;
      browserSelectedPaths = new Set();
      document.getElementById('browserPathText').textContent = dirPath;
      document.getElementById('browserConfirm').disabled = true;
      const body = document.getElementById('browserBody');
      body.innerHTML = '<div class="browse-loading">' + t('loading') + '</div>';

      fetch(API_BASE + '/browse?dir=' + encodeURIComponent(dirPath))
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            body.innerHTML = '<div class="browse-empty">' + (data.error === 'Permission denied' ? t('permissionDenied') : data.error) + '</div>';
            return;
          }
          let html = '';
          if (data.parentDir !== null) {
            html += `<div class="browse-item" onclick="browseDir('${escapeAttr(data.parentDir)}')">
              <div class="browse-icon folder"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>
              <div class="browse-name">.. (${t('parentDir')})</div>
            </div>`;
          }
          if (data.entries && data.entries.length > 0) {
            data.entries.forEach(entry => {
              if (entry.isDir) {
                html += `<div class="browse-item" onclick="browseDir('${escapeAttr(entry.path)}')">
                  <div class="browse-icon folder"><svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></div>
                  <div class="browse-name">${escapeHtml(entry.name)}</div>
                </div>`;
              } else if (entry.isAudio) {
                html += `<div class="browse-item" id="browse-${cssEscape(entry.path)}" onclick="toggleBrowseSelect('${escapeAttr(entry.path)}')">
                  <div class="browse-icon audio"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
                  <div class="browse-name">${escapeHtml(entry.name)}</div>
                  <div class="browse-check"></div>
                </div>`;
              }
            });
          }
          if (!html || (!data.parentDir && data.entries && data.entries.length === 0)) {
            html = '<div class="browse-empty">' + t('emptyDir') + '</div>';
          }
          body.innerHTML = html;
        })
        .catch(() => {
          body.innerHTML = '<div class="browse-empty">' + t('loadFailed') + '</div>';
        });
    }

    function toggleBrowseSelect(path) {
      if (browserSelectedPaths.has(path)) {
        browserSelectedPaths.delete(path);
      } else {
        browserSelectedPaths.add(path);
      }
      const el = document.getElementById('browse-' + cssEscape(path));
      if (el) el.classList.toggle('selected', browserSelectedPaths.has(path));
      document.getElementById('browserConfirm').disabled = browserSelectedPaths.size === 0;
    }

    function confirmBrowser() {
      if (browserSelectedPaths.size === 0) return;
      const wasEmpty = playlist.length === 0;
      const isPlaying = !audioPlayer.paused && playlist.length > 0;
      browserSelectedPaths.forEach(path => {
        const fileName = path.split('/').pop();
        const track = { name: fileName, path: path, isServerFile: true };
        playlist.push(track);
        fetchMetadata(track, playlist.length - 1);
      });
      updatePlaylistUI();
      if (!isPlaying) {
        currentIndex = playlist.length - browserSelectedPaths.size;
        loadTrack(currentIndex);
      }
      showToast(t('addedCount', { count: browserSelectedPaths.size }), 'success');
      closeBrowser();
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function cssEscape(str) {
      return String(str).replace(/[^a-zA-Z0-9]/g, function (c) {
        return '\\' + c.charCodeAt(0).toString(16).padStart(6, '0') + ' ';
      });
    }

    loadVolume();
    updateVolume();
    applyTheme();
    applyI18n();
    claimPrimary();

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
    try {
      window.addEventListener('storage', function (e) {
        if (e.key === 'fnos-theme-mode') applyTheme();
      });
    } catch (e) { }

    (function initFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const pathParam = urlParams.get('path');
      if (pathParam) {
        const decodedPath = decodeURIComponent(pathParam);
        channel.postMessage({ type: 'open-file', path: decodedPath });
        pendingFilePath = decodedPath;
        setTimeout(function () {
          if (isPrimaryWindow && pendingFilePath) {
            addFileFromPath(pendingFilePath);
            pendingFilePath = null;
          } else if (!isPrimaryWindow) {
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-secondary);font-size:14px;">' + t('addedToList', { name: decodedPath.split('/').pop() }) + '</div>';
            setTimeout(function () { try { window.close(); } catch (e) { } }, 1500);
          }
        }, 500);
      }
    })();
  </script>
</body>

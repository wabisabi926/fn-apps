<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>无线热点</title>
  <link rel="stylesheet" href="/app/fn-wifi-hotspot/style.css">
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 data-i18n="appTitle">无线热点</h1>
        <p id="statusSummary">正在加载...</p>
      </div>
      <div class="row-actions">
        <button id="refreshBtn" class="ghost-btn" type="button" data-i18n="refresh">刷新</button>
        <button id="toggleBtn" class="primary-btn" type="button" disabled>开启热点</button>
      </div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="status">状态</h2>
        </div>
        <div class="stats-grid">
          <div class="stat"><span data-i18n="hotspotDevice">热点网卡</span><strong id="statIface">-</strong></div>
          <div class="stat"><span data-i18n="uplink">共享网卡</span><strong id="statUplink">-</strong></div>
          <div class="stat"><span data-i18n="address">地址</span><strong id="statIp">-</strong></div>
          <div class="stat"><span data-i18n="internet">互联网</span><strong id="statInternet">-</strong></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="config">配置</h2>
          <button id="saveBtn" class="primary-btn" type="button" disabled data-i18n="save">保存</button>
        </div>
        <form id="configForm" class="grid">
          <label class="field">
            <span data-i18n="hotspotDevice">热点网卡</span>
            <select name="iface" id="ifaceSelect"></select>
          </label>
          <label class="field">
            <span data-i18n="uplink">共享网卡</span>
            <select name="uplinkIface" id="uplinkSelect"></select>
          </label>
          <label class="field">
            <span>SSID</span>
            <input name="ssid" autocomplete="off">
          </label>
          <label class="field">
            <span data-i18n="password">密码</span>
            <input name="password" type="password" autocomplete="off">
          </label>
          <label class="field">
            <span>IP/CIDR</span>
            <input name="ipCidr" placeholder="192.168.12.1/24" autocomplete="off">
          </label>
          <label class="field">
            <span data-i18n="allowPorts">放行端口</span>
            <input name="allowPorts" placeholder="80,443,5666,5667,67-68/udp" autocomplete="off">
          </label>
          <label class="field">
            <span data-i18n="country">国家码</span>
            <select name="countryCode" id="countrySelect"></select>
          </label>
          <label class="field">
            <span data-i18n="band">频段</span>
            <select name="band">
              <option value="bg">2.4G</option>
              <option value="a">5G</option>
            </select>
          </label>
          <label class="field">
            <span data-i18n="channel">信道</span>
            <select name="channel" id="channelSelect"></select>
          </label>
          <label class="field">
            <span data-i18n="width">带宽</span>
            <select name="channelWidth">
              <option value="20">20 MHz</option>
              <option value="40">40 MHz</option>
              <option value="80">80 MHz</option>
              <option value="160">160 MHz</option>
            </select>
          </label>
        </form>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2 data-i18n="clients">客户端</h2>
          <span id="clientCount" class="meta">0</span>
        </div>
        <div id="clients" class="client-list"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button id="modalCancel" class="ghost-btn" type="button" data-i18n="cancel">取消</button>
        <button id="modalOk" class="primary-btn" type="button" data-i18n="confirm">确定</button>
      </div>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="/app/fn-wifi-hotspot/app.js"></script>
</body>

</html>

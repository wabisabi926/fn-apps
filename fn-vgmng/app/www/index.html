<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="appTitle">存储池管理</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-main">
        <h1 data-i18n="appTitle">存储池管理</h1>
        <p class="subtitle" data-i18n="subtitle">磁盘 / 卷管理</p>
      </div>
      <div class="topbar-actions">
        <button id="btnAbout" class="ghost-btn" type="button" data-i18n="about">关于</button>
        <button id="assembleBtn" class="btn primary" data-i18n="scanAndAssemble">扫描并组装</button>
      </div>
    </header>

    <section class="panel overview-panel">
      <div id="overviewStats" class="stats"></div>
    </section>

    <section class="panel compact-panel">
      <div class="section-head">
        <h2 data-i18n="disks">磁盘</h2>
        <span id="inventoryMeta" class="section-meta"></span>
      </div>
      <div id="inventoryEmpty" class="empty" data-i18n="noDiskInfo">暂未读取到磁盘分区信息。</div>
      <div id="inventoryTableWrap" class="table-wrap hidden"></div>
    </section>

    <section class="panel compact-panel">
      <div class="section-head">
        <h2 data-i18n="volumes">卷</h2>
        <span id="volumeMeta" class="section-meta"></span>
      </div>
      <div id="volumeEmpty" class="empty" data-i18n="noVolumeInfo">暂未发现可挂载或已挂载的卷。</div>
      <div id="volumeTableWrap" class="table-wrap hidden"></div>
    </section>
  </div>

  <div id="aboutModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div class="modal-header">
        <h2 data-i18n="about">关于</h2>
        <button class="icon-btn" data-close type="button" aria-label="关闭">×</button>
      </div>
      <div class="about-body">
        <div class="about-section">
          <p class="about-declaration" data-i18n="aboutDeclaration">本项目由社区维护，免费开源，仅用于学习与交流，请遵守所在地法律法规与平台服务条款。</p>
        </div>
        <div class="about-section">
          <h3 data-i18n="communitySupport">社区支持</h3>
          <ul class="about-list">
            <li>QQ 群：130359605 · <a href="https://qm.qq.com/q/xMUyJacSIw" target="_blank" rel="noopener noreferrer" data-i18n="join">点击加入</a></li>
            <li>Github：<a href="https://github.com/RROrg/fn-apps" target="_blank" rel="noopener noreferrer">RROrg/fn-apps</a></li>
          </ul>
        </div>
        <div class="about-section">
          <h3 data-i18n="sponsorSupport">赞助支持</h3>
          <img class="about-sponsor-image" src="https://fastly.jsdelivr.net/gh/wjz304/wjz304@master/my/buymeacoffee.png" alt="sponsoring">
        </div>
        <div class="about-copyright">
          <a href="https://github.com/RROrg" target="_blank" rel="noopener noreferrer">RROrg</a>
          <a href="https://github.com/wjz304" target="_blank" rel="noopener noreferrer">wjz304</a>
          <span>© 2026 RROrg, Ing, Inc.</span>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="./app.js"></script>
</body>
</html>
